<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>CPTu Marine Sediment Analysis</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.31.0/build/stlite.css" />
    <style>
      /* Force white theme for academic reporting */
      html, body, #root, .stApp {
        background-color: white !important;
        color: black !important;
      }
      p, h1, h2, h3, span, label, table, td, th {
        color: black !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.31.0/build/stlite.js"></script>
    <script>
      stlite.mount({
        requirements: ["pandas", "plotly", "numpy"],
        entrypoint: "app.py",
        files: {
          "app.py": `
import streamlit as st
import pandas as pd
import numpy as np
import plotly.graph_objects as go
from plotly.subplots import make_subplots
import os

def get_sbt_7th_ed(rf, qc_mpa):
    try:
        if qc_mpa <= 0.001: return "Unknown", "#FFFFFF"
        pa = 0.1
        ic = ((3.47 - np.log10(qc_mpa/pa))**2 + (np.log10(rf) + 1.22)**2)**0.5
        
        # Geotechnical 7th Ed Color Mapping
        if ic > 3.60: return "Organic Soils - Peat", "#964B00"
        if ic > 2.95: return "Clays", "#FF0000"
        if ic > 2.60: return "Silt Mixtures", "#FFFF00"
        if ic > 2.05: return "Sand Mixtures", "#90EE90"
        if ic > 1.31: return "Sands", "#008000"
        return "Gravelly Sand to Dense Sand", "#006400"
    except:
        return "Sensitive Fine-Grained", "#E6E6FA"

def parse_cpt(content):
    data = []
    start = False
    for line in content.splitlines():
        if line.startswith('#'):
            start = True
            continue
        if start and '=' in line:
            try:
                row = {p.split('=')[0].strip(): float(p.split('=')[1].strip()) 
                       for p in line.split(',') if '=' in p}
                if row: data.append(row)
            except: continue
    df = pd.DataFrame(data)
    if not df.empty:
        df['Rf'] = (df['FS'] / (df['QC'] * 1000)) * 100
        u0 = df['D'] * 9.81
        df['Bq'] = (df['U'] - u0) / (df['QC'] * 1000 - u0)
        sbt_results = [get_sbt_7th_ed(r, q) for r, q in zip(df['Rf'], df['QC'])]
        df['SBT_Label'] = [x[0] for x in sbt_results]
        df['SBT_Color'] = [x[1] for x in sbt_results]
    return df

st.set_page_config(layout="wide")
st.markdown("<style>.stApp {background-color: white;} [data-testid='stHeader'] {display:none;}</style>", unsafe_allow_html=True)

st.title("Quantitative Analysis and Stratigraphic Profiling of Marine Sediments")

uploaded_file = st.file_uploader("Upload CPT Data", type=['cpt', 'txt'])

if uploaded_file:
    location_id = os.path.splitext(uploaded_file.name)[0]
    df = parse_cpt(uploaded_file.getvalue().decode('utf-8', errors='ignore'))
    
    if not df.empty:
        st.markdown(f"## Location ID: {location_id}")
        
        # Using subplot_titles for absolute horizontal and vertical alignment
        titles = ("q<sub>c</sub> (MPa)", "f<sub>s</sub> (kPa)", "u<sub>2</sub> (kPa)", "R<sub>f</sub> (%)", "B<sub>q</sub>", "SBT (7th Ed)")
        
        fig = make_subplots(
            rows=1, cols=6, 
            shared_yaxes=True, 
            horizontal_spacing=0.018,
            column_widths=[0.17, 0.17, 0.17, 0.13, 0.13, 0.08],
            subplot_titles=titles
        )
        
        depth = df['D'].tolist()
        
        fig.add_trace(go.Scatter(x=df['QC'].tolist(), y=depth, line=dict(color='black', width=1)), row=1, col=1)
        fig.add_trace(go.Scatter(x=df['FS'].tolist(), y=depth, line=dict(color='black', width=1)), row=1, col=2)
        fig.add_trace(go.Scatter(x=df['U'].tolist(), y=depth, line=dict(color='black', width=1)), row=1, col=3)
        fig.add_trace(go.Scatter(x=df['Rf'].tolist(), y=depth, line=dict(color='black', width=1)), row=1, col=4)
        fig.add_trace(go.Scatter(x=df['Bq'].tolist(), y=depth, line=dict(color='black', width=1)), row=1, col=5)
        
        for i in range(len(df)-1):
            fig.add_shape(type="rect", x0=0, x1=1, y0=df['D'].iloc[i], y1=df['D'].iloc[i+1],
                          fillcolor=df['SBT_Color'].iloc[i], line_width=0, row=1, col=6)

        ranges = [[0, max(df['QC'])*1.2], [0, max(df['FS'])*1.3], [0, max(df['U'])*1.2], [0, 8], [-0.2, 1.2], [0, 1]]

        for i in range(1, 7):
            fig.update_xaxes(range=ranges[i-1], side="top", showline=True, linewidth=1.2, 
                             linecolor='black', mirror=True, gridcolor='LightGray', row=1, col=i)
            fig.update_yaxes(autorange="reversed", showline=True, linewidth=1.2, 
                             linecolor='black', mirror=True, gridcolor='LightGray', row=1, col=i)
            
        # Update subplot title font and position
        fig.update_annotations(font=dict(family="serif", size=12, color="black"), y=1.03)

        fig.update_layout(
            height=1100, paper_bgcolor='white', plot_bgcolor='white',
            template="plotly_white", showlegend=False,
            font=dict(family="serif", size=10, color="black"),
            margin=dict(t=100, b=50, l=70, r=40)
        )
        
        st.plotly_chart(fig, use_container_width=True)
        
        st.markdown("### Stratigraphic Classification (Robertson & Cabal, 2022)")
        legend_html = \"\"\"
        <table style='width:100%; border-collapse: collapse; font-family: serif; color: black; background-color: white; border: 1px solid black;'>
          <tr style='border-bottom: 1px solid black;'>
            <td style='width:30px; height:20px; background-color:#FF0000; border-right: 1px solid black;'></td>
            <td style='padding: 5px;'>Clays: Silty Clay to Clay</td>
            <td style='width:30px; background-color:#90EE90; border-right: 1px solid black; border-left: 1px solid black;'></td>
            <td style='padding: 5px;'>Sand Mixtures: Silty Sand to Sandy Silt</td>
          </tr>
          <tr style='border-bottom: 1px solid black;'>
            <td style='background-color:#FFFF00; border-right: 1px solid black;'></td>
            <td style='padding: 5px;'>Silt Mixtures: Clayey Silt to Silty Clay</td>
            <td style='background-color:#008000; border-right: 1px solid black; border-left: 1px solid black;'></td>
            <td style='padding: 5px;'>Sands: Clean Sand to Silty Sand</td>
          </tr>
          <tr style='border-bottom: 1px solid black;'>
            <td style='background-color:#964B00; border-right: 1px solid black;'></td>
            <td style='padding: 5px;'>Organic Soils: Peat</td>
            <td style='background-color:#006400; border-right: 1px solid black; border-left: 1px solid black;'></td>
            <td style='padding: 5px;'>Gravelly Sand to Dense Sand</td>
          </tr>
          <tr>
            <td style='background-color:#E6E6FA; border-right: 1px solid black;'></td>
            <td style='padding: 5px;'>Sensitive Fine-Grained</td>
            <td colspan='2'></td>
          </tr>
        </table>
        \"\"\"
        st.markdown(legend_html, unsafe_allow_html=True)
    else:
        st.error("Data Parsing Error.")
`
        },
      }, document.getElementById("root"));
    </script>
  </body>
</html>
