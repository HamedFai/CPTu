<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>CPTu Analyzer</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.31.0/build/stlite.css" />
  </head>
  <body>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.31.0/build/stlite.js"></script>
    <script>
      stlite.mount({
        requirements: ["pandas", "plotly"],
        entrypoint: "app.py",
        files: {
          "app.py": `
import streamlit as st
import pandas as pd
import plotly.graph_objects as go
from plotly.subplots import make_subplots

def parse_cpt(content):
    data = []
    start = False
    for line in content.splitlines():
        if line.startswith('#'):
            start = True
            continue
        if start and '=' in line:
            try:
                row = {p.split('=')[0].strip(): float(p.split('=')[1].strip()) 
                       for p in line.split(',') if '=' in p}
                if row: data.append(row)
            except: continue
    return pd.DataFrame(data)

st.title("⚓ Marine CPTu Analyzer")
uploaded_file = st.file_uploader("Upload .cpt file", type=['cpt', 'txt'])

if uploaded_file:
    df = parse_cpt(uploaded_file.getvalue().decode('utf-8', errors='ignore'))
    if not df.empty:
        df['Rf'] = (df['FS'] / (df['QC'] * 1000)) * 100
        u0 = df['D'] * 9.81
        df['Bq'] = (df['U'] - u0) / (df['QC'] * 1000 - u0)
        
        fig = make_subplots(rows=1, cols=5, shared_yaxes=True, 
                            subplot_titles=("qc", "fs", "u2", "Rf", "Bq"))
        
        fig.add_trace(go.Scatter(x=df['QC'], y=df['D'], name='qc'), row=1, col=1)
        fig.add_trace(go.Scatter(x=df['FS'], y=df['D'], name='fs'), row=1, col=2)
        fig.add_trace(go.Scatter(x=df['U'], y=df['D'], name='u2'), row=1, col=3)
        fig.add_trace(go.Scatter(x=df['Rf'], y=df['D'], name='Rf'), row=1, col=4)
        fig.add_trace(go.Scatter(x=df['Bq'], y=df['D'], name='Bq'), row=1, col=5)
        
        fig.update_yaxes(autorange="reversed")
        fig.update_layout(height=800, template="plotly_white")
        st.plotly_chart(fig, use_container_width=True)
    else:
        st.error("No data found.")
`
        },
      }, document.getElementById("root"));
    </script>
  </body>
</html>
